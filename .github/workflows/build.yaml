name: Build add-on images

# Builds per-architecture images and publishes them to GHCR as
# ghcr.io/<owner>/ws-scrcpy-ha-<arch>:<version> (+ :latest), matching the
# `image: ghcr.io/.../ws-scrcpy-ha-{arch}` reference in ws-scrcpy/config.yaml.

on:
  push:
    branches:
      - master
      - main
    paths:
      - "src/**"
      - "vendor/**"
      - "webpack/**"
      - "typings/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - "run.sh"
      - "ws-scrcpy/config.yaml"
      - ".github/workflows/build.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
          - arch: armv7
            platform: linux/arm/v7
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read add-on version
        id: meta
        run: |
          version="$(grep -E '^version:' ws-scrcpy/config.yaml | head -1 | sed -E 's/^version:[[:space:]]*"?([^"]+)"?/\1/')"
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${owner}/ws-scrcpy-ha-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
